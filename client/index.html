<html lang="he" dir="rtl">
  <head>
    <title>Welcome</title>
    <link rel="stylesheet" href="./css.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="Form"> 
      <nav class="custom-navbar">
        <div class="nav-actions"> 
          <div id="welcomeMsg" ></div>
            <button type="button" class="btn btn-primary btn-logout" onclick="logOut()">Log Out</button> 
        </div>
      </nav>
     
      
      <div class="text-center">
         <h2 class="text-center">Welcome</h2>
         <br><br>
         <button class="btn btn-primary" onclick="users()">Users</button>
         <button class="btn btn-primary" onclick="employees()">Employees</button>
         <button class="btn btn-primary" onclick="departments()">Departments</button>
         <button class="btn btn-primary" onclick="shifts()">Shifts</button>
      </div>
   

    <script>
       
            window.onload = async function() {

        const name = sessionStorage.getItem("userName");
        if (name) {
          document.getElementById("welcomeMsg").innerText = "Hello " + name;
        }
      }

       const logOut=()=>{
        sessionStorage.clear();
        window.location.href= "login.html"
      }

      const users = () => {
      window.location.href= "users.html"
      }
       const employees = () => {
      window.location.href= "employees.html"
      }

       const departments = () => {
      window.location.href= "department.html"
      }

      
       const shifts = () => {
      window.location.href= "shifts.html"
      }
    </script>
  </body>
</html>
