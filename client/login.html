<html>
  <head>
    <link rel="stylesheet" href="./css.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"/>
    <title>Login</title>
  </head>
  <body>
    <div class="Form">
      <h5 class="text-center">Node.JS – Final Project</h5>
      <h5 class="text-center">Yeudit Mualem</h5>
      <br><br><br>
      <h2 class="text-center">Login</h2>
      <div>
        <label class="form-label" >Username:</label>
        <input class="form-control w-50 mx-auto " id="inpUser"/>
      </div>
      <div>
        <label class="form-label">Email:</label>
        <input class="form-control w-50 mx-auto" id="inpEmail" />
      </div>
      <br />
      <div class="text-center">
        <button type="button" class="btn btn-primary" onclick="login()">Login</button>
      </div>
    </div>
    <script>
       async function login() {
         const username = document.getElementById("inpUser").value
         const email = document.getElementById("inpEmail").value
try {
  const response = await fetch('http://localhost:3000/users/login', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json'
    },
    body: JSON.stringify({ 
        username: username, 
        email: email 
    })
});
if (response.status === 429) {
            alert("Your daily action quota has been reached. You are being redirected to the login page.");
            sessionStorage.clear();
            window.location.href = "login.html";
            return;
        }
if (response.ok){
    const data = await response.json();
    const userName = data.user.FullName
    const nameId = data.user._id
alert('You have successfully connected.', data);
sessionStorage.setItem('userName', userName);
sessionStorage.setItem('userId', nameId);
window.location.href = "index.html";
} else
console.log ('The details are incorrect.' +response.statusText)
} catch (error) {
  console.error(error);
  alert('Communication error: Make sure the server is running and there is an internet connection.')
}
         
        }
    </script>
  </body>
</html>
