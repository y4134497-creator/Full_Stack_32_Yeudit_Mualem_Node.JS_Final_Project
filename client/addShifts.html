<html lang="he" dir="rtl">
  <head>
    <title>New Shift</title>
    <link rel="stylesheet" href="./css.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="Form"> 
      <nav class="custom-navbar">
            <div class="nav-actions d-flex flex-column align-items-start gap-2"> 
  <div id="welcomeMsg" class="mb-2"></div>
  <button type="button" class="btn btn-primary btn-logout" onclick="logOut()">Log Out</button> 
  <button type="button" class="btn btn-primary btn-logout" onclick="pageHome()">Page Home</button> 
</div>
      </nav>
     <h3 class="text-center">New Shift</h3>
    <div>
        <br>
     <label class="form-label" >Date</label>
     <input type="date" class="form-control w-50 mx-auto " id="inDate" required>
    </div>
     <div>
     <label class="form-label" >Starting Hour</label>
     <input type="number" class="form-control w-50 mx-auto " id="inStart" required>
    </div>
     <div>
     <label class="form-label" >Ending Hour</label>
     <input type="number" class="form-control w-50 mx-auto " id="inEnd" required>
    </div>
         <button type="button" class="btn btn-primary" onclick="save()">Save</button> 
         <button type="button" class="btn btn-primary" onclick="cancel()">Cancel </button> 

        <script>

           window.onload = async function() {

        const name = sessionStorage.getItem("userName");
        
        if (name) {
          document.getElementById("welcomeMsg").innerText = "Hello " + name;
        }
      }
            
             
            
    async function save() {
        const userId = sessionStorage.getItem('userId')
        const date = document.getElementById("inDate").value;
        const start = document.getElementById("inStart").value;
        const end = document.getElementById("inEnd").value;

        if (!date || start === "" || end === "") {
        alert("Please fill in all required fields.");
        return;
    }

    const arrSft = {
      Date: date,
      StartingHour: +start, 
      EndingHour: +end, 
        }
      
      if(!arrSft.Date || !arrSft.StartingHour  || !arrSft.EndingHour){
        alert("Please fill in all required fields.");
        return
      } else{
try {
    const response = await fetch('http://localhost:3000/shifts',{
                method: 'POST',
                headers: {
                'Content-Type': 'application/json',
                'userid': userId 
      },
      body: JSON.stringify(arrSft)
     })
      if (response.status === 429) {
            alert("Your daily action quota has been reached. You are being redirected to the login page.");
            sessionStorage.clear();
            window.location.href = "login.html";
            return;
        }
       if(response.ok){
            alert("New shift created successfully!!")
            window.location.href = "shifts.html"
      }else
      console.log("Error creating shift: " + response.statusText)
} catch (error) {
    console.error(error);
    alert("Failed to connect to server.")
    }
console.log(arrSft);
}
 }            
    function cancel() {
window.location.href = "shifts.html"
    }
      const logOut=()=>{
        sessionStorage.clear();
        window.location.href= "login.html"
      }
      const pageHome=()=>{
        window.location.href= "index.html"
      }

        </script>
        
    </body>
</html>
